<script>
const GOAL = 1000000;

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSU4ndbvchsHmYzYJx0LUmOMUOSM-27Fwd0Lc9rRjN7uGqDlgBK9qH083gdPU2cEYoLxJ5j1dUMZBBg/pub?output=csv&t=" + new Date().getTime())
  .then(res => res.text())
  .then(csv => {
    const rows = csv.trim().split("\n").slice(1);

    let latestSteps = 0;
    let todayMax = 0;
    let dailyMax = {};
    let monthlyTotal = 0; // ✅ FIXED (declare early)

    const today = new Date().toISOString().slice(0,10);
    const currentMonth = today.slice(0,7);

    rows.forEach(row => {
      const [date, time, steps] = row.split(",");
      const stepNum = parseInt(steps);

      latestSteps = stepNum;

      if (date === today && stepNum > todayMax) {
        todayMax = stepNum;
      }

      if (!dailyMax[date] || stepNum > dailyMax[date]) {
        dailyMax[date] = stepNum;
      }
    });

    // Calculate monthly total
    for (let date in dailyMax) {
      if (date.startsWith(currentMonth)) {
        monthlyTotal += dailyMax[date];
      }
    }

    // Convert steps to distance
    const KM_PER_STEP = 0.0008;
    const distanceKm = monthlyTotal * KM_PER_STEP;
    const distanceMiles = distanceKm * 0.621371;
    const percentDistance = Math.min((distanceKm / 800) * 100, 100);

    // Progress bar
    const percent = Math.min((monthlyTotal / GOAL) * 100, 100);
    document.getElementById("progress").style.width = percent + "%";

    // Format numbers
    const format = num => num.toLocaleString();

    // Update text
    document.getElementById("latest").innerText =
      "Live: " + format(latestSteps) + " steps";

    document.getElementById("today").innerText =
      "Today: " + format(todayMax);

    document.getElementById("monthly").innerText =
      "This month: " + format(monthlyTotal);

    document.getElementById("goalText").innerText =
      Math.round(percent) + "% of " + format(GOAL) + " step goal";

    document.getElementById("distance").innerText =
      "Distance: " + distanceKm.toFixed(1) + " km (" + distanceMiles.toFixed(1) + " miles)";

    document.getElementById("comparison").innerText =
      "That’s like walking " + Math.round(percentDistance) + "% of the way to 500 miles 🚶";
  });
</script>
