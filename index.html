<!DOCTYPE html>
<html>

<head>
  <title>One Million Steps in May</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #fdfbff);
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 34px;
      background: linear-gradient(90deg, #ff4d88, #ff7eb3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .hero {
      font-size: 40px;
      font-weight: bold;
      margin: 20px 0;
      color: #ff4d88;
    }

    .stat {
      font-size: 16px;
      margin: 6px 0;
      color: #444;
    }

    .progress-bar {
      width: 100%;
      background: #eee;
      border-radius: 20px;
      overflow: hidden;
      height: 18px;
      margin: 20px 0;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff7eb3, #ff4d88);
    }

    .donate {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 28px;
      background: linear-gradient(90deg, #ff4d88, #ff7eb3);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
    }

    .donations {
      margin-top: 30px;
      text-align: left;
    }

    .donation-card {
      background: #fff0f6;
      padding: 12px;
      border-radius: 12px;
      margin: 10px 0;
    }

    canvas {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>👟 One Million Steps in May 💖</h1>

<p>🚶‍♀️ Follow my progress | 💖 Support the cause | 📊 Live updates</p>

<div class="hero" id="hero">Loading...</div>

<div class="stat" id="dayCounter"></div>
<div class="stat" id="marathons"></div>
<div class="stat" id="distance"></div>

<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div class="stat" id="goalText"></div>

<a class="donate" href="https://www.justgiving.com/page/liv-shaw-may-million" target="_blank">
  💖 Donate
</a>

<canvas id="chart"></canvas>

<div class="donations">
  <h3>💬 Recent Donations</h3>
  <div id="donationList"></div>
</div>

</div>

<script>
const GOAL = 1000000;

// STEP DATA
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSU4ndbvchsHmYzYJx0LUmOMUOSM-27Fwd0Lc9rRjN7uGqDlgBK9qH083gdPU2cEYoLxJ5j1dUMZBBg/pub?output=csv&t=" + new Date().getTime())
.then(res => res.text())
.then(csv => {
  const rows = csv.trim().split("\n").slice(1);

  let dailyMax = {};
  let monthlyTotal = 0;

  const today = new Date().toISOString().slice(0,10);
  const currentMonth = today.slice(0,7);

  rows.forEach(row => {
    const cols = row.split(",");
    if (cols.length < 3) return;

    const date = cols[0];
    const steps = parseInt(cols[2]);
    if (isNaN(steps)) return;

    if (!dailyMax[date] || steps > dailyMax[date]) {
      dailyMax[date] = steps;
    }
  });

  for (let date in dailyMax) {
    if (date.startsWith(currentMonth)) {
      monthlyTotal += dailyMax[date];
    }
  }

  const percent = Math.min((monthlyTotal / GOAL) * 100, 100);

  document.getElementById("hero").innerText =
    monthlyTotal.toLocaleString() + " steps 👟";

  document.getElementById("goalText").innerText =
    Math.round(percent) + "% of goal 🎯";

  document.getElementById("progress").style.width = percent + "%";

  // Distance + marathons
  const km = monthlyTotal * 0.0008;
  const miles = km * 0.621371;
  const marathons = monthlyTotal / 52000;

  document.getElementById("distance").innerText =
    miles.toFixed(1) + " miles walked 🗺️";

  document.getElementById("marathons").innerText =
    marathons.toFixed(2) + " marathons 🏃‍♀️";

  // Day counter
  const now = new Date();
  document.getElementById("dayCounter").innerText =
    "Day " + now.getDate() + " of May 📅";

  // Chart
  const labels = [];
  const data = [];

  for (let date in dailyMax) {
    if (date.startsWith(currentMonth)) {
      labels.push(date.slice(5));
      data.push(dailyMax[date]);
    }
  }

  new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        tension: 0.3
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });
});


// DONATIONS (SECOND SHEET)
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSU4ndbvchsHmYzYJx0LUmOMUOSM-27Fwd0Lc9rRjN7uGqDlgBK9qH083gdPU2cEYoLxJ5j1dUMZBBg/pub?output=csv")
.then(res => res.text())
.then(csv => {
  const rows = csv.trim().split("\n").slice(1);

  const container = document.getElementById("donationList");

  rows.slice(-5).reverse().forEach(row => {
    const [name, message, amount] = row.split(",");

    const div = document.createElement("div");
    div.className = "donation-card";
    div.innerHTML = `<strong>${name}</strong> donated £${amount}<br>${message}`;

    container.appendChild(div);
  });
});
</script>

</body>
</html>
