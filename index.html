<!DOCTYPE html>
<html>
<head>
  <title>My Stepathon</title>
  <meta http-equiv="refresh" content="60">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 10px;
    }

    .stat {
      font-size: 28px;
      margin: 15px 0;
    }

    .progress-bar {
      width: 100%;
      background: #eee;
      border-radius: 20px;
      overflow: hidden;
      height: 25px;
      margin: 20px 0;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      transition: width 0.5s ease;
    }

    .goal {
      color: #666;
      font-size: 14px;
    }

    .donate {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #28a745;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="container">

<h1>🚶 My Charity Stepathon</h1>
<p>
  Walking 1,000,000 steps to raise money for Mind — a charity close to my heart.
  With NHS mental health treatment waiting lists getting longer, the work Mind does is more important than ever.
</p>

<div class="stat" id="latest">Loading...</div>
<div class="stat" id="today"></div>
<div class="stat" id="monthly"></div>

<div class="stat" id="distance"></div>
<div class="goal" id="comparison"></div>
<div class="progress-bar">
  <div class="progress-fill" id="progress"></div>
</div>

<div class="goal" id="goalText"></div>

<a class="donate" href="https://www.justgiving.com/page/liv-shaw-may-million" target="_blank">Donate</a>

</div>

  .then(res => res.text())

    const rows = csv.trim().split("\n").slice(1);

    let latestSteps = 0;
    let todayMax = 0;
    let dailyMax = {};

    const today = new Date().toISOString().slice(0,10);
    const currentMonth = today.slice(0,7);

    rows.forEach(row => {
      const [date, time, steps] = row.split(",");
      const stepNum = parseInt(steps);

      latestSteps = stepNum;

      if (date === today && stepNum > todayMax) {
        todayMax = stepNum;
      }

      if (!dailyMax[date] || stepNum > dailyMax[date]) {
        dailyMax[date] = stepNum;
      }
    });

      if (date.startsWith(currentMonth)) {
        monthlyTotal += dailyMax[date];
      }
    }

   // Progress bar
const percent = Math.min((monthlyTotal / GOAL) * 100, 100);
document.getElementById("progress").style.width = percent + "%";

// Format numbers nicely
const format = num => num.toLocaleString();

// Update text
document.getElementById("latest").innerText =
  "Live: " + format(latestSteps) + " steps";

document.getElementById("today").innerText =
  "Today: " + format(todayMax);

  "This month: " + format(monthlyTotal);

document.getElementById("distance").innerText =
  "Distance: " + format(distanceKm.toFixed(1)) + " km (" + format(distanceMiles.toFixed(1)) + " miles)";

document.getElementById("comparison").innerText =
  "That’s like walking " + Math.round(percentDistance) + "% of the way to 500 miles 🚶";
  });
</script>

</body>
</html>
